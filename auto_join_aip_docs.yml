# Workflow code generated by GhatGPT-5 with think for KBM @ Kirisame Aerospace System
# AIPs complications are for experimental 'ArrowKappa' AI assistant training

name: Auto Join AIPs Documents

on:
  push:
    branches: [ kbm_aip_document_complication ]
    paths:
      - "AIPs/aip-*.md"
      - "AIPs/AIP-*.md"
      - ".github/workflows/auto_join_aip_docs.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-join-aips
  cancel-in-progress: true

jobs:
  join:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build complication markdown
        shell: bash
        run: |
          set -euo pipefail
          OUT="AIPs/complications/arrow_air_dao_aip_complication(auto).md"
          mkdir -p "$(dirname "$OUT")"
          echo "# All AIPs" > "$OUT"
          echo "" >> "$OUT"

          shopt -s nullglob
          files=(AIPs/aip-*.md AIPs/AIP-*.md)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No AIPs matched pattern 'aip-*.md' in AIPs/"; exit 0
          fi

          for f in $(printf "%s\n" "${files[@]}" | sort -V); do
            echo -e "\n---\n" >> "$OUT"
            echo "**File:** $(basename "$f")" >> "$OUT"
            echo "" >> "$OUT"
            cat "$f" >> "$OUT"
            echo "" >> "$OUT"
          done

          echo "Generated $OUT"

      - name: Commit & Push if changed
        run: |
          OUT="AIPs/complications/arrow_air_dao_aip_complication(auto).md"
          if ! git diff --quiet -- "$OUT"; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$OUT"
            git commit -m "chore: update AIPs complication [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
